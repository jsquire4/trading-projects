# Force Nixpacks to use Node.js provider with npm (not yarn).
# Each service uses NIXPACKS_BUILD_CMD and NIXPACKS_START_CMD
# env vars to cd into their subdirectory.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "python311", "gcc", "gnumake", "pkg-config", "libusb1", "libudev-zero", "systemd"]

[phases.install]
cmds = ["echo 'install phase skipped — handled by NIXPACKS_BUILD_CMD'"]
